name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: pathfinder.exe
            archive: pathfinder-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: pathfinder
            archive: pathfinder-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: pathfinder
            archive: pathfinder-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: pathfinder
            archive: pathfinder-macos-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          Copy-Item -Recurse data dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp -r data dist/
          tar -czf ${{ matrix.archive }} -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
